name: Otomatik Makale Üret

on:
  schedule:
    # Her Pazartesi, Çarşamba, Cuma saat 09:00 UTC (12:00 Türkiye)
    - cron: '0 9 * * 1'   # Pazartesi
    - cron: '0 9 * * 3'   # Çarşamba
    - cron: '0 9 * * 5'   # Cuma
  workflow_dispatch:        # Manuel çalıştırma butonu da ekler

jobs:
  makale-yaz:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri yükle
        run: pip install anthropic

      - name: Makale üret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/makale_uret.py

      - name: Değişiklikleri commit et
        run: |
          git config --global user.name "KumarRehberi Bot"
          git config --global user.email "bot@kumarrehberi.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Otomatik makale eklendi - $(date '+%Y-%m-%d')"
          git push
